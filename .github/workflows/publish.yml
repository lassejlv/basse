name: Publish

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push control plane
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.name }}/basse-control-plane:latest
          cache-from: type=gha,scope=control-plane
          cache-to: type=gha,mode=max,scope=control-plane

      - name: Build and push agent
        uses: docker/build-push-action@v6
        with:
          context: ./apps/agent
          push: true
          build-args: |
            VERSION=${{ github.sha }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/basse-agent:latest
            ghcr.io/${{ steps.owner.outputs.name }}/basse-agent:${{ github.sha }}
          cache-from: type=gha,scope=agent
          cache-to: type=gha,mode=max,scope=agent
